name: ci-image

on:
  push:
    branches:
      - main
    paths:
      - .github/docker/ci/Dockerfile
      - .github/workflows/ci-image.yml
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  packages: write

jobs:
  build-ci-image:
    runs-on: ubuntu-24.04
    env:
      CI_IMAGE_REPO: ghcr.io/smlc666/debugger-linux-lkm-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/ci/Dockerfile
          push: true
          tags: |
            ${{ env.CI_IMAGE_REPO }}:main
            ${{ env.CI_IMAGE_REPO }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=ci-image
          cache-to: type=gha,scope=ci-image,mode=max
