name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  module-build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache linux-headers-generic

      - name: Configure ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-ccache-

      - name: Build module
        env:
          CC: ccache gcc
        run: |
          KDIR="$(ls -d /usr/src/linux-headers-*-generic | sort -V | tail -n1)"
          echo "Using KDIR=$KDIR"
          make KDIR="$KDIR"

      - name: Show ccache stats
        run: ccache --show-stats
