name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  module-build-generic:
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache linux-headers-generic

      - name: Prepare ccache directory
        run: mkdir -p "$CCACHE_DIR"

      - name: Configure ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-ccache-

      - name: Reset ccache stats
        run: ccache --zero-stats

      - name: Build module
        run: |
          KDIR="$(ls -d /usr/src/linux-headers-*-generic | sort -V | tail -n1)"
          echo "Using KDIR=$KDIR"
          make KDIR="$KDIR" CC="ccache gcc"

      - name: Show ccache stats
        run: ccache --show-stats

  module-build-android14-6-1:
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache-android14-6.1
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      KERNEL_REPO: https://android.googlesource.com/kernel/common
      KERNEL_BRANCH: android14-6.1
      NDK_VERSION: android-ndk-r27d
      NDK_ZIP: android-ndk-r27d-linux.zip
      NDK_URL: "https://dl.google.com/android/repository/android-ndk-r27d-linux.zip"
      NDK_DIR: ${{ github.workspace }}/.ndk/android-ndk-r27d
      ANDROID_API: "34"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Android kernel build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            ccache \
            clang \
            flex \
            git \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            pahole \
            rsync \
            unzip

      - name: Prepare ccache directory
        run: |
          mkdir -p "$CCACHE_DIR"
          mkdir -p "$(dirname "$NDK_DIR")"

      - name: Configure ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-android14-6.1-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-android14-6.1-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-android14-6.1-ccache-

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK_DIR }}
          key: ${{ runner.os }}-${{ env.NDK_VERSION }}

      - name: Reset ccache stats
        run: ccache --zero-stats

      - name: Fetch Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -L "$NDK_URL" -o "$RUNNER_TEMP/$NDK_ZIP"
          unzip -q "$RUNNER_TEMP/$NDK_ZIP" -d "$(dirname "$NDK_DIR")"

      - name: Fetch Android common kernel
        run: |
          git clone --depth=1 --branch "$KERNEL_BRANCH" "$KERNEL_REPO" "$RUNNER_TEMP/android-kernel-common"

      - name: Build Android GKI tree and external module
        run: |
          KERNEL_DIR="$RUNNER_TEMP/android-kernel-common"
          OUT_DIR="$RUNNER_TEMP/android-kernel-out"
          make -C "$KERNEL_DIR" \
            O="$OUT_DIR" \
            ARCH=arm64 \
            LLVM=1 \
            CC="ccache clang" \
            HOSTCC="ccache clang" \
            gki_defconfig
          make -C "$KERNEL_DIR" \
            O="$OUT_DIR" \
            ARCH=arm64 \
            LLVM=1 \
            CC="ccache clang" \
            HOSTCC="ccache clang" \
            modules_prepare
          make -C "$KERNEL_DIR" \
            O="$OUT_DIR" \
            M="$GITHUB_WORKSPACE" \
            ARCH=arm64 \
            LLVM=1 \
            CC="ccache clang" \
            HOSTCC="ccache clang" \
            modules

      - name: Build Android userspace tools
        run: |
          TOOLCHAIN="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin"
          TARGET="aarch64-linux-android${ANDROID_API}"
          mkdir -p "$GITHUB_WORKSPACE/out/android14-6.1"
          ccache "$TOOLCHAIN/${TARGET}-clang" -O2 -Wall -Wextra \
            -o "$GITHUB_WORKSPACE/out/android14-6.1/lkmdbg_open_session" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_open_session.c"
          ccache "$TOOLCHAIN/${TARGET}-clang" -O2 -Wall -Wextra -pthread \
            -o "$GITHUB_WORKSPACE/out/android14-6.1/lkmdbg_mem_test" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_mem_test.c"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lkmdbg-android14-6.1
          path: |
            lkmdbg.ko
            out/android14-6.1/lkmdbg_open_session
            out/android14-6.1/lkmdbg_mem_test
          if-no-files-found: error

      - name: Show ccache stats
        run: ccache --show-stats

  qemu-arm64-build-artifacts:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache-qemu-arm64
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      KERNEL_REPO: https://github.com/torvalds/linux.git
      KERNEL_REF: v6.6
      KERNEL_OUT_DIR: ${{ github.workspace }}/.cache/qemu-linux-arm64-out

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install arm64 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            ccache \
            cpio \
            flex \
            gcc-aarch64-linux-gnu \
            git \
            libc6-dev-arm64-cross \
            libelf-dev \
            libssl-dev

      - name: Prepare cache directories
        run: |
          mkdir -p "$CCACHE_DIR"
          mkdir -p "$KERNEL_OUT_DIR"

      - name: Restore QEMU ccache
        id: qemu-ccache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-qemu-arm64-ccache-${{ env.KERNEL_REF }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-qemu-arm64-ccache-${{ env.KERNEL_REF }}-${{ github.ref_name }}-
            ${{ runner.os }}-qemu-arm64-ccache-${{ env.KERNEL_REF }}-

      - name: Restore QEMU kernel output cache
        id: qemu-kernel-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.KERNEL_OUT_DIR }}
          key: ${{ runner.os }}-qemu-arm64-kernel-out-${{ env.KERNEL_REF }}-v2

      - name: Reset QEMU ccache stats
        run: ccache --zero-stats

      - name: Fetch upstream Linux
        run: |
          git clone --depth=1 --branch "$KERNEL_REF" "$KERNEL_REPO" \
            "$RUNNER_TEMP/linux-arm64-qemu"

      - name: Build arm64 kernel and external module
        run: |
          KERNEL_DIR="$RUNNER_TEMP/linux-arm64-qemu"
          OUT_DIR="$KERNEL_OUT_DIR"
          COMMON_ARGS=(
            -C "$KERNEL_DIR"
            O="$OUT_DIR"
            ARCH=arm64
            CROSS_COMPILE=aarch64-linux-gnu-
            CC="ccache aarch64-linux-gnu-gcc"
            HOSTCC="ccache gcc"
          )
          if [ ! -f "$OUT_DIR/arch/arm64/boot/Image" ] || \
             [ ! -f "$OUT_DIR/Module.symvers" ] || \
             [ "${{ steps.qemu-kernel-cache.outputs.cache-hit }}" != "true" ]; then
            make "${COMMON_ARGS[@]}" defconfig
            "$KERNEL_DIR/scripts/config" --file "$OUT_DIR/.config" \
              -e DEBUG_FS \
              -e DEVTMPFS \
              -e DEVTMPFS_MOUNT \
              -e KALLSYMS \
              -e KALLSYMS_ALL \
              -e KPROBES \
              -e MODULES \
              -e MODULE_UNLOAD \
              -e PROC_FS
            make "${COMMON_ARGS[@]}" olddefconfig
            make "${COMMON_ARGS[@]}" -j"$(nproc)" Image modules
          else
            echo "Reusing cached arm64 kernel output from $OUT_DIR"
          fi
          make -C "$KERNEL_DIR" O="$OUT_DIR" M="$GITHUB_WORKSPACE" \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache aarch64-linux-gnu-gcc" \
            HOSTCC="ccache gcc" \
            -j"$(nproc)" modules

      - name: Build QEMU initramfs
        run: |
          INITRAMFS_DIR="$RUNNER_TEMP/initramfs"
          ccache aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/qemu-smoke-init" \
            "$GITHUB_WORKSPACE/.github/scripts/qemu-smoke-init.c"
          ccache aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_open_session" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_open_session.c"
          ccache aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static -pthread \
            -o "$RUNNER_TEMP/lkmdbg_mem_test" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_mem_test.c"
          mkdir -p "$INITRAMFS_DIR/dev" "$INITRAMFS_DIR/proc" \
            "$INITRAMFS_DIR/sys" "$INITRAMFS_DIR/sys/kernel" \
            "$INITRAMFS_DIR/sys/kernel/debug"
          install -m 0755 "$RUNNER_TEMP/qemu-smoke-init" \
            "$INITRAMFS_DIR/init"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_open_session" \
            "$INITRAMFS_DIR/lkmdbg_open_session"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_mem_test" \
            "$INITRAMFS_DIR/lkmdbg_mem_test"
          cp "$GITHUB_WORKSPACE/lkmdbg.ko" "$INITRAMFS_DIR/lkmdbg.ko"
          (
            cd "$INITRAMFS_DIR"
            find . -print0 | cpio --null -ov --format=newc | gzip -9 \
              > "$RUNNER_TEMP/initramfs.cpio.gz"
          )

      - name: Package QEMU artifacts
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/qemu-artifacts"
          KERNEL_IMAGE="$KERNEL_OUT_DIR/arch/arm64/boot/Image"
          INITRAMFS="$RUNNER_TEMP/initramfs.cpio.gz"
          mkdir -p "$ARTIFACT_DIR"
          cp "$KERNEL_IMAGE" "$ARTIFACT_DIR/Image"
          cp "$INITRAMFS" "$ARTIFACT_DIR/initramfs.cpio.gz"
          cp "$GITHUB_WORKSPACE/lkmdbg.ko" "$ARTIFACT_DIR/lkmdbg.ko"

      - name: Upload QEMU boot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qemu-arm64-boot
          path: ${{ runner.temp }}/qemu-artifacts
          if-no-files-found: error

      - name: Show QEMU ccache stats
        if: always()
        run: ccache --show-stats

      - name: Save QEMU ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-qemu-arm64-ccache-${{ env.KERNEL_REF }}-${{ github.ref_name }}-${{ github.sha }}

      - name: Save QEMU kernel output cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.KERNEL_OUT_DIR }}
          key: ${{ runner.os }}-qemu-arm64-kernel-out-${{ env.KERNEL_REF }}-v2

  qemu-arm64-smoke:
    runs-on: ubuntu-24.04
    needs: qemu-arm64-build-artifacts
    timeout-minutes: 30

    steps:
      - name: Download QEMU boot artifacts
        uses: actions/download-artifact@v4
        with:
          name: qemu-arm64-boot
          path: ${{ runner.temp }}/qemu-artifacts

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm

      - name: Run QEMU smoke test (TCG)
        run: |
          KERNEL_IMAGE="$RUNNER_TEMP/qemu-artifacts/Image"
          INITRAMFS="$RUNNER_TEMP/qemu-artifacts/initramfs.cpio.gz"
          LOG="$RUNNER_TEMP/qemu-smoke-tcg.log"
          timeout 240s qemu-system-aarch64 \
            -machine virt \
            -cpu cortex-a72 \
            -smp 2 \
            -m 1024 \
            -nographic \
            -kernel "$KERNEL_IMAGE" \
            -initrd "$INITRAMFS" \
            -append "console=ttyAMA0 rdinit=/init panic=-1" \
            -no-reboot | tee "$LOG"
          grep -q 'LKMDBG_QEMU_SMOKE_OK' "$LOG"

      - name: Upload QEMU TCG log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-arm64-smoke-log
          path: ${{ runner.temp }}/qemu-smoke-tcg.log
          if-no-files-found: ignore

  qemu-arm64-smoke-kvm:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    needs: qemu-arm64-build-artifacts
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - name: Download QEMU boot artifacts
        uses: actions/download-artifact@v4
        with:
          name: qemu-arm64-boot
          path: ${{ runner.temp }}/qemu-artifacts

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm

      - name: Probe hosted ARM64 KVM support
        run: |
          LOG="$RUNNER_TEMP/qemu-kvm-probe.log"
          {
            echo "runner=$(uname -a)"
            echo "qemu=$(qemu-system-aarch64 --version | head -n1)"
            echo "accel_help=$(qemu-system-aarch64 -accel help | tr '\n' ' ')"
            if [ -e /dev/kvm ]; then
              ls -l /dev/kvm
            else
              echo "/dev/kvm missing"
            fi
          } | tee "$LOG"
          test -e /dev/kvm

      - name: Run QEMU smoke test (KVM)
        run: |
          KERNEL_IMAGE="$RUNNER_TEMP/qemu-artifacts/Image"
          INITRAMFS="$RUNNER_TEMP/qemu-artifacts/initramfs.cpio.gz"
          LOG="$RUNNER_TEMP/qemu-smoke-kvm.log"
          timeout 180s qemu-system-aarch64 \
            -machine virt,accel=kvm \
            -cpu host \
            -smp 2 \
            -m 1024 \
            -nographic \
            -kernel "$KERNEL_IMAGE" \
            -initrd "$INITRAMFS" \
            -append "console=ttyAMA0 rdinit=/init panic=-1" \
            -no-reboot | tee "$LOG"
          grep -q 'LKMDBG_QEMU_SMOKE_OK' "$LOG"

      - name: Upload QEMU KVM probe log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-arm64-smoke-kvm-probe-log
          path: ${{ runner.temp }}/qemu-kvm-probe.log
          if-no-files-found: ignore

      - name: Upload QEMU KVM log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-arm64-smoke-kvm-log
          path: ${{ runner.temp }}/qemu-smoke-kvm.log
          if-no-files-found: ignore
