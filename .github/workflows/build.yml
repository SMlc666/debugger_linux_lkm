name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

defaults:
  run:
    shell: bash

jobs:
  prepare-ci-image:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      CI_IMAGE_REPO: ghcr.io/smlc666/debugger-linux-lkm-ci
    outputs:
      image_ref: ${{ steps.select-image.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect CI image changes
        id: ci-image-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ci_image:
              - '.github/docker/ci/**'
              - '.github/workflows/ci-image.yml'

      - name: Set up Docker Buildx
        if: steps.ci-image-changes.outputs.ci_image == 'true' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.ci-image-changes.outputs.ci_image == 'true' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CI image
        if: steps.ci-image-changes.outputs.ci_image == 'true' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/ci/Dockerfile
          push: true
          tags: |
            ${{ env.CI_IMAGE_REPO }}:main
            ${{ env.CI_IMAGE_REPO }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=ci-image
          cache-to: type=gha,scope=ci-image,mode=max

      - name: Select CI image
        id: select-image
        run: |
          if [ "${{ steps.ci-image-changes.outputs.ci_image }}" = "true" ] && \
             [ "${{ github.event_name }}" != "pull_request" -o \
               "${{ github.event.pull_request.head.repo.fork || false }}" != "true" ]; then
            echo "image_ref=${CI_IMAGE_REPO}:sha-${GITHUB_SHA}" >>"$GITHUB_OUTPUT"
          else
            echo "image_ref=${CI_IMAGE_REPO}:main" >>"$GITHUB_OUTPUT"
          fi

  module-build-generic:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential linux-headers-generic

      - name: Build module
        run: |
          KDIR="$(ls -d /usr/src/linux-headers-*-generic | sort -V | tail -n1)"
          echo "Using KDIR=$KDIR"
          make KDIR="$KDIR" CC="gcc"

  qemu-arm64-build-artifacts:
    runs-on: ubuntu-24.04
    needs: prepare-ci-image
    timeout-minutes: 120
    container:
      image: ${{ needs.prepare-ci-image.outputs.image_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: 5.10
            kernel_ref: android12-5.10
            kernel_config: gki_defconfig
            use_llvm: true
            artifact_name: qemu-arm64-boot-5.10
            cache_suffix: v5.10-gki
            disable_lto: false
            disable_btf: false
            kernel_make_jobs: 0
          - label: 5.15
            kernel_ref: android13-5.15
            kernel_config: gki_defconfig
            use_llvm: true
            artifact_name: qemu-arm64-boot-5.15
            cache_suffix: v5.15-gki
            disable_lto: true
            disable_btf: false
            kernel_make_jobs: 4
          - label: 6.1
            kernel_ref: android14-6.1
            kernel_config: gki_defconfig
            use_llvm: true
            artifact_name: qemu-arm64-boot-6.1
            cache_suffix: v6.1-android14-gki
            disable_lto: false
            disable_btf: false
            kernel_make_jobs: 0
          - label: 6.6
            kernel_ref: android15-6.6
            kernel_config: gki_defconfig
            use_llvm: true
            artifact_name: qemu-arm64-boot-6.6
            cache_suffix: v6.6-gki
            disable_lto: false
            disable_btf: false
            kernel_make_jobs: 0
          - label: 6.12
            kernel_ref: android16-6.12
            kernel_config: gki_defconfig
            use_llvm: true
            artifact_name: qemu-arm64-boot-6.12
            cache_suffix: v6.12-gki
            disable_lto: false
            disable_btf: true
            kernel_make_jobs: 0
          - label: 6.18
            kernel_ref: android17-6.18
            kernel_config: gki_defconfig
            use_llvm: true
            artifact_name: qemu-arm64-boot-6.18
            cache_suffix: v6.18-gki
            disable_lto: false
            disable_btf: true
            kernel_make_jobs: 0
    env:
      KERNEL_REPO: https://android.googlesource.com/kernel/common
      KERNEL_REF: ${{ matrix.kernel_ref }}
      KERNEL_OUT_DIR: ${{ github.workspace }}/.cache/qemu-linux-arm64-out-${{ matrix.cache_suffix }}
      QEMU_KERNEL_CACHE_REV: v5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare cache directories
        run: mkdir -p "$KERNEL_OUT_DIR"

      - name: Restore QEMU kernel output cache
        id: qemu-kernel-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.KERNEL_OUT_DIR }}
          # Keep the key exact. A broader restore key previously revived stale
          # guest kernels that were missing virtio keyboard support, which made
          # the input smoke silently exercise old artifacts.
          key: ${{ runner.os }}-qemu-arm64-kernel-out-ack-${{ matrix.cache_suffix }}-${{ matrix.kernel_ref }}-${{ matrix.kernel_config }}-llvm-${{ matrix.use_llvm }}-${{ env.QEMU_KERNEL_CACHE_REV }}

      - name: Inspect restored QEMU kernel cache
        id: qemu-kernel-cache-state
        run: |
          cache_complete=false
          reuse_kernel=false
          IMAGE_PATH="$KERNEL_OUT_DIR/arch/arm64/boot/Image"
          SYMVERS_PATH="$KERNEL_OUT_DIR/Module.symvers"
          CONFIG_PATH="$KERNEL_OUT_DIR/.config"
          AUTOCONF_PATH="$KERNEL_OUT_DIR/include/generated/autoconf.h"
          AUTO_CONF_PATH="$KERNEL_OUT_DIR/include/config/auto.conf"
          FIXDEP_PATH="$KERNEL_OUT_DIR/scripts/basic/fixdep"
          MODPOST_PATH="$KERNEL_OUT_DIR/scripts/mod/modpost"
          # The QEMU smoke relies on a PCI virtio keyboard. Treat a restored
          # kernel tree as reusable only if those config bits are already baked
          # into the cached guest build output.
          CONFIG_INPUT_KEYBOARD_REQUIRED=false
          CONFIG_VIRTIO_REQUIRED=false
          CONFIG_VIRTIO_PCI_REQUIRED=false
          CONFIG_VIRTIO_INPUT_REQUIRED=false
          if [ -f "$CONFIG_PATH" ]; then
            grep -q '^CONFIG_INPUT_KEYBOARD=y$' "$CONFIG_PATH" && CONFIG_INPUT_KEYBOARD_REQUIRED=true
            grep -q '^CONFIG_VIRTIO=y$' "$CONFIG_PATH" && CONFIG_VIRTIO_REQUIRED=true
            grep -q '^CONFIG_VIRTIO_PCI=y$' "$CONFIG_PATH" && CONFIG_VIRTIO_PCI_REQUIRED=true
            grep -q '^CONFIG_VIRTIO_INPUT=y$' "$CONFIG_PATH" && CONFIG_VIRTIO_INPUT_REQUIRED=true
          fi
          if [ -f "$IMAGE_PATH" ] && \
             [ -f "$SYMVERS_PATH" ] && \
             [ -f "$CONFIG_PATH" ] && \
             [ -f "$AUTOCONF_PATH" ] && \
             [ -f "$AUTO_CONF_PATH" ] && \
             [ -x "$FIXDEP_PATH" ] && \
             [ -x "$MODPOST_PATH" ] && \
             [ "$CONFIG_INPUT_KEYBOARD_REQUIRED" = "true" ] && \
             [ "$CONFIG_VIRTIO_REQUIRED" = "true" ] && \
             [ "$CONFIG_VIRTIO_PCI_REQUIRED" = "true" ] && \
             [ "$CONFIG_VIRTIO_INPUT_REQUIRED" = "true" ]; then
            cache_complete=true
            reuse_kernel=true
          fi
          echo "cache_complete=$cache_complete" >>"$GITHUB_OUTPUT"
          echo "reuse_kernel=$reuse_kernel" >>"$GITHUB_OUTPUT"
          echo "cache-hit=${{ steps.qemu-kernel-cache.outputs.cache-hit }}"
          echo "cache-complete=$cache_complete"
          echo "reuse-kernel=$reuse_kernel"

      - name: Fetch Android common kernel
        run: |
          git clone --depth=1 --branch "$KERNEL_REF" "$KERNEL_REPO" \
            "$RUNNER_TEMP/linux-arm64-qemu"

      - name: Build arm64 kernel and external module
        run: |
          KERNEL_DIR="$RUNNER_TEMP/linux-arm64-qemu"
          OUT_DIR="$KERNEL_OUT_DIR"
          BUILD_JOBS="${{ matrix.kernel_make_jobs }}"
          if [ -z "$BUILD_JOBS" ] || [ "$BUILD_JOBS" = "0" ]; then
            BUILD_JOBS="$(nproc)"
          fi
          COMMON_ARGS=(-C "$KERNEL_DIR" O="$OUT_DIR" ARCH=arm64)
          if [ "${{ matrix.use_llvm }}" = "true" ]; then
            COMMON_ARGS+=(
              LLVM=1
              CLANG_TRIPLE=aarch64-linux-gnu-
              CC="clang"
              CROSS_COMPILE=aarch64-linux-gnu-
              HOSTCC="clang"
            )
          else
            COMMON_ARGS+=(
              CROSS_COMPILE=aarch64-linux-gnu-
              CC="aarch64-linux-gnu-gcc"
              HOSTCC="gcc"
            )
          fi
          if [ "${{ steps.qemu-kernel-cache-state.outputs.reuse_kernel }}" != "true" ]; then
            make "${COMMON_ARGS[@]}" "${{ matrix.kernel_config }}"
            "$KERNEL_DIR/scripts/config" --file "$OUT_DIR/.config" \
              -e DEBUG_FS \
              -e DEVTMPFS \
              -e DEVTMPFS_MOUNT \
              -e INPUT \
              -e INPUT_EVDEV \
              -e INPUT_KEYBOARD \
              -e KALLSYMS \
              -e KALLSYMS_ALL \
              -e KPROBES \
              -e MODULES \
              -e MODVERSIONS \
              -e PCI \
              -e MODULE_UNLOAD \
              -e PROC_FS \
              -e VIRTIO \
              -e VIRTIO_PCI \
              -e VIRTIO_INPUT
            if [ "${{ matrix.disable_lto }}" = "true" ]; then
              "$KERNEL_DIR/scripts/config" --file "$OUT_DIR/.config" \
                -d LTO_CLANG \
                -d LTO_CLANG_THIN \
                -d LTO_CLANG_FULL \
                -d THINLTO \
                -e LTO_NONE || true
            fi
            if [ "${{ matrix.disable_btf }}" = "true" ]; then
              "$KERNEL_DIR/scripts/config" --file "$OUT_DIR/.config" \
                -d DEBUG_INFO_BTF \
                -d DEBUG_INFO_BTF_MODULES \
                -d PAHOLE_HAS_SPLIT_BTF || true
            fi
            make "${COMMON_ARGS[@]}" olddefconfig
            make "${COMMON_ARGS[@]}" -j"$BUILD_JOBS" Image modules
          else
            echo "Reusing cached arm64 kernel output from $OUT_DIR"
          fi
          MODULE_ARGS=(-C "$KERNEL_DIR" O="$OUT_DIR" M="$GITHUB_WORKSPACE" ARCH=arm64 -j"$BUILD_JOBS" modules)
          if [ "${{ matrix.use_llvm }}" = "true" ]; then
            MODULE_ARGS=(
              LLVM=1
              CLANG_TRIPLE=aarch64-linux-gnu-
              CC="clang"
              CROSS_COMPILE=aarch64-linux-gnu-
              HOSTCC="clang"
              "${MODULE_ARGS[@]}"
            )
          else
            MODULE_ARGS=(CROSS_COMPILE=aarch64-linux-gnu- CC="aarch64-linux-gnu-gcc" HOSTCC="gcc" "${MODULE_ARGS[@]}")
          fi
          make "${MODULE_ARGS[@]}"

      - name: Prepare stripped module artifact
        run: |
          cp "$GITHUB_WORKSPACE/lkmdbg.ko" "$RUNNER_TEMP/lkmdbg.unstripped.ko"
          aarch64-linux-gnu-strip --strip-debug \
            -o "$RUNNER_TEMP/lkmdbg.ko" \
            "$GITHUB_WORKSPACE/lkmdbg.ko"

      - name: Verify rebuilt QEMU kernel cache
        id: qemu-kernel-cache-verify
        if: always()
        run: |
          IMAGE_PATH="$KERNEL_OUT_DIR/arch/arm64/boot/Image"
          SYMVERS_PATH="$KERNEL_OUT_DIR/Module.symvers"
          CONFIG_PATH="$KERNEL_OUT_DIR/.config"
          AUTOCONF_PATH="$KERNEL_OUT_DIR/include/generated/autoconf.h"
          AUTO_CONF_PATH="$KERNEL_OUT_DIR/include/config/auto.conf"
          FIXDEP_PATH="$KERNEL_OUT_DIR/scripts/basic/fixdep"
          MODPOST_PATH="$KERNEL_OUT_DIR/scripts/mod/modpost"
          if [ -f "$IMAGE_PATH" ] && \
             [ -f "$SYMVERS_PATH" ] && \
             [ -f "$CONFIG_PATH" ] && \
             [ -f "$AUTOCONF_PATH" ] && \
             [ -f "$AUTO_CONF_PATH" ] && \
             [ -x "$FIXDEP_PATH" ] && \
             [ -x "$MODPOST_PATH" ]; then
            echo "cache_complete=true" >>"$GITHUB_OUTPUT"
          else
            echo "cache_complete=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Build QEMU initramfs
        run: |
          INITRAMFS_DIR="$RUNNER_TEMP/initramfs"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/qemu-smoke-init" \
            "$GITHUB_WORKSPACE/.github/scripts/qemu-smoke-init.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/qemu-watchpoint-control" \
            "$GITHUB_WORKSPACE/.github/scripts/qemu-watchpoint-control.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_open_session" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_open_session.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_stealth_ctl" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_stealth_ctl.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_control.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static -pthread \
            -o "$RUNNER_TEMP/lkmdbg_mem_test" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_mem_test.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_events.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_memory.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_control.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static -pthread \
            -o "$RUNNER_TEMP/lkmdbg_mmu_test" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_mmu_test.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_control.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_example_session_status" \
            "$GITHUB_WORKSPACE/tools/examples/example_session_status.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_example_mem_rw" \
            "$GITHUB_WORKSPACE/tools/examples/example_mem_rw.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_memory.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_example_threads_query" \
            "$GITHUB_WORKSPACE/tools/examples/example_threads_query.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_control.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_example_regs_fp" \
            "$GITHUB_WORKSPACE/tools/examples/example_regs_fp.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_control.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_example_stealth_roundtrip" \
            "$GITHUB_WORKSPACE/tools/examples/example_stealth_roundtrip.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_control.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_example_sysrule_combo" \
            "$GITHUB_WORKSPACE/tools/examples/example_sysrule_combo.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_control.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_events.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_example_vma_page_query" \
            "$GITHUB_WORKSPACE/tools/examples/example_vma_page_query.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_memory.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_example_remote_alloc_rw" \
            "$GITHUB_WORKSPACE/tools/examples/example_remote_alloc_rw.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_memory.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_example_phys_translate_read" \
            "$GITHUB_WORKSPACE/tools/examples/example_phys_translate_read.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_memory.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_example_perf_baseline" \
            "$GITHUB_WORKSPACE/tools/examples/example_perf_baseline.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_memory.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_example_view_external_read" \
            "$GITHUB_WORKSPACE/tools/examples/example_view_external_read.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_memory.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_example_view_wxshadow_exec" \
            "$GITHUB_WORKSPACE/tools/examples/example_view_wxshadow_exec.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_c.c" \
            "$GITHUB_WORKSPACE/tools/driver/bridge_memory.c"
          mkdir -p "$INITRAMFS_DIR/dev" "$INITRAMFS_DIR/proc" \
            "$INITRAMFS_DIR/sys" "$INITRAMFS_DIR/sys/kernel" \
            "$INITRAMFS_DIR/sys/kernel/debug"
          install -m 0755 "$RUNNER_TEMP/qemu-smoke-init" \
            "$INITRAMFS_DIR/init"
          install -m 0755 "$RUNNER_TEMP/qemu-watchpoint-control" \
            "$INITRAMFS_DIR/qemu_watchpoint_control"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_open_session" \
            "$INITRAMFS_DIR/lkmdbg_open_session"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_stealth_ctl" \
            "$INITRAMFS_DIR/lkmdbg_stealth_ctl"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_mem_test" \
            "$INITRAMFS_DIR/lkmdbg_mem_test"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_mmu_test" \
            "$INITRAMFS_DIR/lkmdbg_mmu_test"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_example_session_status" \
            "$INITRAMFS_DIR/lkmdbg_example_session_status"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_example_mem_rw" \
            "$INITRAMFS_DIR/lkmdbg_example_mem_rw"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_example_threads_query" \
            "$INITRAMFS_DIR/lkmdbg_example_threads_query"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_example_regs_fp" \
            "$INITRAMFS_DIR/lkmdbg_example_regs_fp"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_example_stealth_roundtrip" \
            "$INITRAMFS_DIR/lkmdbg_example_stealth_roundtrip"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_example_sysrule_combo" \
            "$INITRAMFS_DIR/lkmdbg_example_sysrule_combo"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_example_vma_page_query" \
            "$INITRAMFS_DIR/lkmdbg_example_vma_page_query"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_example_remote_alloc_rw" \
            "$INITRAMFS_DIR/lkmdbg_example_remote_alloc_rw"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_example_phys_translate_read" \
            "$INITRAMFS_DIR/lkmdbg_example_phys_translate_read"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_example_perf_baseline" \
            "$INITRAMFS_DIR/lkmdbg_example_perf_baseline"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_example_view_external_read" \
            "$INITRAMFS_DIR/lkmdbg_example_view_external_read"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_example_view_wxshadow_exec" \
            "$INITRAMFS_DIR/lkmdbg_example_view_wxshadow_exec"
          cp "$RUNNER_TEMP/lkmdbg.ko" "$INITRAMFS_DIR/lkmdbg.ko"
          (
            cd "$INITRAMFS_DIR"
            find . -print0 | cpio --null -ov --format=newc | gzip -9 \
              > "$RUNNER_TEMP/initramfs.cpio.gz"
          )

      - name: Package QEMU artifacts
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/qemu-artifacts"
          KERNEL_IMAGE="$KERNEL_OUT_DIR/arch/arm64/boot/Image"
          INITRAMFS="$RUNNER_TEMP/initramfs.cpio.gz"
          mkdir -p "$ARTIFACT_DIR"
          cp "$KERNEL_IMAGE" "$ARTIFACT_DIR/Image"
          cp "$INITRAMFS" "$ARTIFACT_DIR/initramfs.cpio.gz"
          cp "$RUNNER_TEMP/lkmdbg.ko" "$ARTIFACT_DIR/lkmdbg.ko"
          cp "$RUNNER_TEMP/lkmdbg.unstripped.ko" "$ARTIFACT_DIR/lkmdbg.unstripped.ko"

      - name: Upload QEMU boot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/qemu-artifacts
          if-no-files-found: error

      - name: Save QEMU kernel output cache
        if: always() && steps.qemu-kernel-cache-state.outputs.reuse_kernel != 'true' && steps.qemu-kernel-cache-verify.outputs.cache_complete == 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.KERNEL_OUT_DIR }}
          key: ${{ runner.os }}-qemu-arm64-kernel-out-ack-${{ matrix.cache_suffix }}-${{ matrix.kernel_ref }}-${{ matrix.kernel_config }}-llvm-${{ matrix.use_llvm }}-${{ env.QEMU_KERNEL_CACHE_REV }}

  qemu-arm64-smoke:
    runs-on: ubuntu-24.04
    needs:
      - prepare-ci-image
      - qemu-arm64-build-artifacts
    timeout-minutes: 30
    container:
      image: ${{ needs.prepare-ci-image.outputs.image_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: 5.10
            artifact_name: qemu-arm64-boot-5.10
            log_name: qemu-arm64-smoke-log-5.10
          - label: 5.15
            artifact_name: qemu-arm64-boot-5.15
            log_name: qemu-arm64-smoke-log-5.15
          - label: 6.1
            artifact_name: qemu-arm64-boot-6.1
            log_name: qemu-arm64-smoke-log-6.1
          - label: 6.6
            artifact_name: qemu-arm64-boot-6.6
            log_name: qemu-arm64-smoke-log-6.6
          - label: 6.12
            artifact_name: qemu-arm64-boot-6.12
            log_name: qemu-arm64-smoke-log-6.12
          - label: 6.18
            artifact_name: qemu-arm64-boot-6.18
            log_name: qemu-arm64-smoke-log-6.18

    steps:
      - name: Download QEMU boot artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/qemu-artifacts

      - name: Run QEMU smoke test (TCG)
        run: |
          set -euo pipefail
          KERNEL_IMAGE="$RUNNER_TEMP/qemu-artifacts/Image"
          INITRAMFS="$RUNNER_TEMP/qemu-artifacts/initramfs.cpio.gz"
          LOG="$RUNNER_TEMP/qemu-smoke-tcg.log"
          MONITOR="$RUNNER_TEMP/qemu-smoke-monitor.sock"
          rm -f "$LOG" "$MONITOR"
          timeout 240s qemu-system-aarch64 \
            -machine virt \
            -cpu cortex-a72 \
            -smp 2 \
            -m 1024 \
            -nographic \
            -nic none \
            -device virtio-keyboard-pci,rombar=0 \
            -kernel "$KERNEL_IMAGE" \
            -initrd "$INITRAMFS" \
            -append "console=ttyAMA0 rdinit=/init panic=-1" \
            -monitor "unix:$MONITOR,server,nowait" \
            -no-reboot >"$LOG" 2>&1 &
          QEMU_PID=$!
          cleanup() {
            if kill -0 "$QEMU_PID" 2>/dev/null; then
              kill "$QEMU_PID" 2>/dev/null || true
              wait "$QEMU_PID" || true
            fi
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if [ -S "$MONITOR" ]; then
              break
            fi
            if ! kill -0 "$QEMU_PID" 2>/dev/null; then
              wait "$QEMU_PID"
            fi
            sleep 1
          done
          test -S "$MONITOR"

          for _ in $(seq 1 120); do
            if grep -q 'LKMDBG_QEMU_INPUT_WAIT_HOST_KEY' "$LOG"; then
              break
            fi
            if grep -q 'LKMDBG_QEMU_SMOKE_OK' "$LOG"; then
              break
            fi
            if ! kill -0 "$QEMU_PID" 2>/dev/null; then
              wait "$QEMU_PID" || true
              break
            fi
            sleep 1
          done
          if ! grep -q 'LKMDBG_QEMU_INPUT_WAIT_HOST_KEY' "$LOG"; then
            if grep -q 'LKMDBG_QEMU_SESSION_UNAVAILABLE' "$LOG"; then
              wait "$QEMU_PID" || true
              trap - EXIT
              if ! grep -q 'LKMDBG_QEMU_SMOKE_OK' "$LOG"; then
                echo "::group::QEMU smoke markers"
                grep -a 'LKMDBG_QEMU_' "$LOG" || true
                echo "::endgroup::"
                echo "::group::QEMU smoke tail"
                tail -n 200 "$LOG" || true
                echo "::endgroup::"
                exit 1
              fi
              exit 0
            fi
            echo "::group::QEMU smoke markers"
            grep -a 'LKMDBG_QEMU_' "$LOG" || true
            echo "::endgroup::"
            echo "::group::QEMU smoke tail"
            tail -n 200 "$LOG" || true
            echo "::endgroup::"
            exit 1
          fi

          printf 'sendkey a\n' | socat - UNIX-CONNECT:"$MONITOR" >/dev/null

          wait "$QEMU_PID"
          trap - EXIT
          if ! grep -q 'LKMDBG_QEMU_SMOKE_OK' "$LOG"; then
            echo "::group::QEMU smoke markers"
            grep -a 'LKMDBG_QEMU_' "$LOG" || true
            echo "::endgroup::"
            echo "::group::QEMU smoke tail"
            tail -n 200 "$LOG" || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Upload QEMU TCG log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.log_name }}
          path: ${{ runner.temp }}/qemu-smoke-tcg.log
          if-no-files-found: ignore

  qemu-arm64-transport-smoke:
    runs-on: ubuntu-24.04
    needs:
      - prepare-ci-image
      - qemu-arm64-build-artifacts
    timeout-minutes: 30
    container:
      image: ${{ needs.prepare-ci-image.outputs.image_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Download representative QEMU boot artifacts
        uses: actions/download-artifact@v4
        with:
          name: qemu-arm64-boot-6.6
          path: ${{ runner.temp }}/qemu-artifacts

      - name: Run representative transport smoke (TCG)
        run: |
          set -euo pipefail
          KERNEL_IMAGE="$RUNNER_TEMP/qemu-artifacts/Image"
          INITRAMFS="$RUNNER_TEMP/qemu-artifacts/initramfs.cpio.gz"
          LOG="$RUNNER_TEMP/qemu-transport-smoke-tcg.log"
          timeout 240s qemu-system-aarch64 \
            -machine virt \
            -cpu cortex-a72 \
            -smp 2 \
            -m 1024 \
            -nographic \
            -nic none \
            -kernel "$KERNEL_IMAGE" \
            -initrd "$INITRAMFS" \
            -append "console=ttyAMA0 rdinit=/init panic=-1 lkmdbg.proc_version_repeats=1 lkmdbg.smoke_clusters=transport,behavior lkmdbg.behavior_strict=1" \
            -no-reboot | tee "$LOG"
          grep -q 'LKMDBG_QEMU_CLUSTER_OK name=transport-negative' "$LOG"
          grep -q 'LKMDBG_QEMU_CLUSTER_OK name=transport' "$LOG"
          grep -q 'LKMDBG_QEMU_CLUSTER_OK name=behavior' "$LOG"
          grep -q 'LKMDBG_QEMU_BEHAVIOR_PERF ' "$LOG"
          grep -q 'LKMDBG_QEMU_BEHAVIOR_DEBUG ' "$LOG"
          grep -q 'LKMDBG_QEMU_BEHAVIOR_MEMORY ' "$LOG"
          grep -q 'LKMDBG_QEMU_BEHAVIOR_APP ' "$LOG"
          grep -q 'LKMDBG_QEMU_SMOKE_OK' "$LOG"

      - name: Upload representative transport smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-arm64-transport-smoke-log-6.6
          path: ${{ runner.temp }}/qemu-transport-smoke-tcg.log
          if-no-files-found: ignore

  qemu-arm64-hook-soak:
