name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  module-build-generic:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential linux-headers-generic

      - name: Build module
        run: |
          KDIR="$(ls -d /usr/src/linux-headers-*-generic | sort -V | tail -n1)"
          echo "Using KDIR=$KDIR"
          make KDIR="$KDIR" CC="gcc"

  module-build-android-gki:
    name: module-build-${{ matrix.label }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: android14-6.1
            kernel_branch: android14-6.1
            artifact_name: lkmdbg-android14-6.1
            out_dir: out/android14-6.1
            ccache_suffix: android14-6.1
            disable_btf: false
          - label: android15-6.6
            kernel_branch: android15-6.6
            artifact_name: lkmdbg-android15-6.6
            out_dir: out/android15-6.6
            ccache_suffix: android15-6.6
            disable_btf: false
          - label: android16-6.12
            kernel_branch: android16-6.12
            artifact_name: lkmdbg-android16-6.12
            out_dir: out/android16-6.12
            ccache_suffix: android16-6.12
            disable_btf: true
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache-${{ matrix.ccache_suffix }}
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_MAXSIZE: 128M
      KERNEL_REPO: https://android.googlesource.com/kernel/common
      KERNEL_BRANCH: ${{ matrix.kernel_branch }}
      NDK_VERSION: android-ndk-r27d
      NDK_ZIP: android-ndk-r27d-linux.zip
      NDK_URL: "https://dl.google.com/android/repository/android-ndk-r27d-linux.zip"
      NDK_DIR: ${{ github.workspace }}/.ndk/android-ndk-r27d
      ANDROID_API: "34"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Android kernel build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            ccache \
            clang \
            flex \
            git \
            libdw-dev \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            pahole \
            rsync \
            unzip

      - name: Prepare ccache directory
        run: |
          mkdir -p "$CCACHE_DIR"
          mkdir -p "$(dirname "$NDK_DIR")"
          ccache --max-size="$CCACHE_MAXSIZE"

      - name: Restore Android ccache snapshot
        id: android-ccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-${{ matrix.ccache_suffix }}-ccache-v1

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK_DIR }}
          key: ${{ runner.os }}-${{ env.NDK_VERSION }}

      - name: Reset ccache stats
        run: ccache --zero-stats

      - name: Fetch Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -L "$NDK_URL" -o "$RUNNER_TEMP/$NDK_ZIP"
          unzip -q "$RUNNER_TEMP/$NDK_ZIP" -d "$(dirname "$NDK_DIR")"

      - name: Fetch Android common kernel
        run: |
          git clone --depth=1 --branch "$KERNEL_BRANCH" "$KERNEL_REPO" "$RUNNER_TEMP/android-kernel-common"

      - name: Build Android GKI tree and external module
        run: |
          KERNEL_DIR="$RUNNER_TEMP/android-kernel-common"
          OUT_DIR="$RUNNER_TEMP/android-kernel-out"
          COMMON_ARGS=(
            -C "$KERNEL_DIR"
            O="$OUT_DIR"
            ARCH=arm64
            LLVM=1
            CC="ccache clang"
            HOSTCC="ccache clang"
          )
          make "${COMMON_ARGS[@]}" gki_defconfig
          if [ "${{ matrix.disable_btf || false }}" = "true" ]; then
            "$KERNEL_DIR/scripts/config" --file "$OUT_DIR/.config" \
              -d DEBUG_INFO_BTF \
              -d DEBUG_INFO_BTF_MODULES
            make "${COMMON_ARGS[@]}" olddefconfig
          fi
          make "${COMMON_ARGS[@]}" modules_prepare
          make "${COMMON_ARGS[@]}" -j"$(nproc)" modules
          test -f "$OUT_DIR/Module.symvers"
          make "${COMMON_ARGS[@]}" \
            M="$GITHUB_WORKSPACE" \
            -j"$(nproc)" \
            modules

      - name: Build Android userspace tools
        run: |
          TOOLCHAIN="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin"
          TARGET="aarch64-linux-android${ANDROID_API}"
          mkdir -p "$GITHUB_WORKSPACE/${{ matrix.out_dir }}"
          ccache "$TOOLCHAIN/${TARGET}-clang" -O2 -Wall -Wextra \
            -o "$GITHUB_WORKSPACE/${{ matrix.out_dir }}/lkmdbg_open_session" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_open_session.c"
          ccache "$TOOLCHAIN/${TARGET}-clang" -O2 -Wall -Wextra -pthread \
            -o "$GITHUB_WORKSPACE/${{ matrix.out_dir }}/lkmdbg_mem_test" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_mem_test.c"
          ccache "$TOOLCHAIN/${TARGET}-clang" -O2 -Wall -Wextra -pthread \
            -o "$GITHUB_WORKSPACE/${{ matrix.out_dir }}/lkmdbg_mmu_test" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_mmu_test.c"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            lkmdbg.ko
            ${{ matrix.out_dir }}/lkmdbg_open_session
            ${{ matrix.out_dir }}/lkmdbg_mem_test
            ${{ matrix.out_dir }}/lkmdbg_mmu_test
          if-no-files-found: error

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats

      - name: Save Android ccache snapshot on failure
        if: failure() && steps.android-ccache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-${{ matrix.ccache_suffix }}-ccache-v1

  qemu-arm64-build-artifacts:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      KERNEL_REPO: https://github.com/torvalds/linux.git
      KERNEL_REF: v6.6
      KERNEL_OUT_DIR: ${{ github.workspace }}/.cache/qemu-linux-arm64-out

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install arm64 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            cpio \
            flex \
            gcc-aarch64-linux-gnu \
            git \
            libc6-dev-arm64-cross \
            libelf-dev \
            libssl-dev

      - name: Prepare cache directories
        run: mkdir -p "$KERNEL_OUT_DIR"

      - name: Restore QEMU kernel output cache
        id: qemu-kernel-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.KERNEL_OUT_DIR }}
          key: ${{ runner.os }}-qemu-arm64-kernel-out-${{ env.KERNEL_REF }}-v2

      - name: Fetch upstream Linux
        run: |
          git clone --depth=1 --branch "$KERNEL_REF" "$KERNEL_REPO" \
            "$RUNNER_TEMP/linux-arm64-qemu"

      - name: Build arm64 kernel and external module
        run: |
          KERNEL_DIR="$RUNNER_TEMP/linux-arm64-qemu"
          OUT_DIR="$KERNEL_OUT_DIR"
          COMMON_ARGS=(
            -C "$KERNEL_DIR"
            O="$OUT_DIR"
            ARCH=arm64
            CROSS_COMPILE=aarch64-linux-gnu-
            CC="aarch64-linux-gnu-gcc"
            HOSTCC="gcc"
          )
          if [ ! -f "$OUT_DIR/arch/arm64/boot/Image" ] || \
             [ ! -f "$OUT_DIR/Module.symvers" ] || \
             [ "${{ steps.qemu-kernel-cache.outputs.cache-hit }}" != "true" ]; then
            make "${COMMON_ARGS[@]}" defconfig
            "$KERNEL_DIR/scripts/config" --file "$OUT_DIR/.config" \
              -e DEBUG_FS \
              -e DEVTMPFS \
              -e DEVTMPFS_MOUNT \
              -e KALLSYMS \
              -e KALLSYMS_ALL \
              -e KPROBES \
              -e MODULES \
              -e MODULE_UNLOAD \
              -e PROC_FS
            make "${COMMON_ARGS[@]}" olddefconfig
            make "${COMMON_ARGS[@]}" -j"$(nproc)" Image modules
          else
            echo "Reusing cached arm64 kernel output from $OUT_DIR"
          fi
          make -C "$KERNEL_DIR" O="$OUT_DIR" M="$GITHUB_WORKSPACE" \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="aarch64-linux-gnu-gcc" \
            HOSTCC="gcc" \
            -j"$(nproc)" modules

      - name: Build QEMU initramfs
        run: |
          INITRAMFS_DIR="$RUNNER_TEMP/initramfs"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/qemu-smoke-init" \
            "$GITHUB_WORKSPACE/.github/scripts/qemu-smoke-init.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/qemu-watchpoint-control" \
            "$GITHUB_WORKSPACE/.github/scripts/qemu-watchpoint-control.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_open_session" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_open_session.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static \
            -o "$RUNNER_TEMP/lkmdbg_stealth_ctl" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_stealth_ctl.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static -pthread \
            -o "$RUNNER_TEMP/lkmdbg_mem_test" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_mem_test.c"
          aarch64-linux-gnu-gcc -O2 -Wall -Wextra -static -pthread \
            -o "$RUNNER_TEMP/lkmdbg_mmu_test" \
            "$GITHUB_WORKSPACE/tools/lkmdbg_mmu_test.c"
          mkdir -p "$INITRAMFS_DIR/dev" "$INITRAMFS_DIR/proc" \
            "$INITRAMFS_DIR/sys" "$INITRAMFS_DIR/sys/kernel" \
            "$INITRAMFS_DIR/sys/kernel/debug"
          install -m 0755 "$RUNNER_TEMP/qemu-smoke-init" \
            "$INITRAMFS_DIR/init"
          install -m 0755 "$RUNNER_TEMP/qemu-watchpoint-control" \
            "$INITRAMFS_DIR/qemu_watchpoint_control"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_open_session" \
            "$INITRAMFS_DIR/lkmdbg_open_session"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_stealth_ctl" \
            "$INITRAMFS_DIR/lkmdbg_stealth_ctl"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_mem_test" \
            "$INITRAMFS_DIR/lkmdbg_mem_test"
          install -m 0755 "$RUNNER_TEMP/lkmdbg_mmu_test" \
            "$INITRAMFS_DIR/lkmdbg_mmu_test"
          cp "$GITHUB_WORKSPACE/lkmdbg.ko" "$INITRAMFS_DIR/lkmdbg.ko"
          (
            cd "$INITRAMFS_DIR"
            find . -print0 | cpio --null -ov --format=newc | gzip -9 \
              > "$RUNNER_TEMP/initramfs.cpio.gz"
          )

      - name: Package QEMU artifacts
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/qemu-artifacts"
          KERNEL_IMAGE="$KERNEL_OUT_DIR/arch/arm64/boot/Image"
          INITRAMFS="$RUNNER_TEMP/initramfs.cpio.gz"
          mkdir -p "$ARTIFACT_DIR"
          cp "$KERNEL_IMAGE" "$ARTIFACT_DIR/Image"
          cp "$INITRAMFS" "$ARTIFACT_DIR/initramfs.cpio.gz"
          cp "$GITHUB_WORKSPACE/lkmdbg.ko" "$ARTIFACT_DIR/lkmdbg.ko"

      - name: Upload QEMU boot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qemu-arm64-boot
          path: ${{ runner.temp }}/qemu-artifacts
          if-no-files-found: error

      - name: Save QEMU kernel output cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.KERNEL_OUT_DIR }}
          key: ${{ runner.os }}-qemu-arm64-kernel-out-${{ env.KERNEL_REF }}-v2

  qemu-arm64-smoke:
    runs-on: ubuntu-24.04
    needs: qemu-arm64-build-artifacts
    timeout-minutes: 30

    steps:
      - name: Download QEMU boot artifacts
        uses: actions/download-artifact@v4
        with:
          name: qemu-arm64-boot
          path: ${{ runner.temp }}/qemu-artifacts

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm

      - name: Run QEMU smoke test (TCG)
        run: |
          KERNEL_IMAGE="$RUNNER_TEMP/qemu-artifacts/Image"
          INITRAMFS="$RUNNER_TEMP/qemu-artifacts/initramfs.cpio.gz"
          LOG="$RUNNER_TEMP/qemu-smoke-tcg.log"
          timeout 240s qemu-system-aarch64 \
            -machine virt \
            -cpu cortex-a72 \
            -smp 2 \
            -m 1024 \
            -nographic \
            -kernel "$KERNEL_IMAGE" \
            -initrd "$INITRAMFS" \
            -append "console=ttyAMA0 rdinit=/init panic=-1" \
            -no-reboot | tee "$LOG"
          grep -q 'LKMDBG_QEMU_SMOKE_OK' "$LOG"

      - name: Upload QEMU TCG log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-arm64-smoke-log
          path: ${{ runner.temp }}/qemu-smoke-tcg.log
          if-no-files-found: ignore

  qemu-arm64-hook-soak:
    runs-on: ubuntu-24.04
    needs: qemu-arm64-build-artifacts
    timeout-minutes: 30

    steps:
      - name: Download QEMU boot artifacts
        uses: actions/download-artifact@v4
        with:
          name: qemu-arm64-boot
          path: ${{ runner.temp }}/qemu-artifacts

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm

      - name: Run QEMU hook soak test (TCG)
        run: |
          KERNEL_IMAGE="$RUNNER_TEMP/qemu-artifacts/Image"
          INITRAMFS="$RUNNER_TEMP/qemu-artifacts/initramfs.cpio.gz"
          LOG="$RUNNER_TEMP/qemu-hook-soak-tcg.log"
          timeout 300s qemu-system-aarch64 \
            -machine virt \
            -cpu cortex-a72 \
            -smp 2 \
            -m 1024 \
            -nographic \
            -kernel "$KERNEL_IMAGE" \
            -initrd "$INITRAMFS" \
            -append "console=ttyAMA0 rdinit=/init panic=-1 lkmdbg.hook_soak_only lkmdbg.proc_version_repeats=50 lkmdbg.seq_read_repeats=50" \
            -no-reboot | tee "$LOG"
          grep -q 'LKMDBG_QEMU_HOOK_SOAK_OK' "$LOG"

      - name: Upload QEMU hook soak log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-arm64-hook-soak-log
          path: ${{ runner.temp }}/qemu-hook-soak-tcg.log
          if-no-files-found: ignore
