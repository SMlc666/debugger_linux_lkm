name: Build OnePlus SM8550 Ace2Pro Android13 GKI5.15

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-oneplus-sm8550-ace2pro-a13-gki515:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      ONEPLUS_CPU_BRANCH: sm8550
      ONEPLUS_FEIL: oneplus_ace2_pro_v
      ONEPLUS_CPUD: kalama
      ONEPLUS_BUILD_METHOD: gki
      KERNEL_REPO_URL: https://github.com/OnePlusOSS/kernel_manifest.git
      KERNEL_WORKSPACE: ${{ github.workspace }}/kernel_workspace
      OFFICIAL_OUT_ROOT: ${{ github.workspace }}/kernel_workspace/kernel_platform/out
      KERNEL_OUT_CACHE_REV: v2
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_MAXSIZE: 2G

    steps:
      - name: Checkout module source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            binutils-aarch64-linux-gnu \
            bison \
            build-essential \
            ccache \
            clang \
            dwarves \
            flex \
            gcc-aarch64-linux-gnu \
            git \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            python3

      - name: Verify required build tools
        run: |
          command -v pahole
          pahole --version

      - name: Prepare cache directories
        run: |
          mkdir -p "$OFFICIAL_OUT_ROOT"
          mkdir -p "$CCACHE_DIR"

      - name: Restore OnePlus kernel output cache
        id: oneplus-kernel-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.OFFICIAL_OUT_ROOT }}
          key: ${{ runner.os }}-oneplus-sm8550-ace2pro-a13-gki5.15-kernel-out-official-${{ env.KERNEL_OUT_CACHE_REV }}

      - name: Inspect restored OnePlus kernel cache
        id: oneplus-kernel-cache-state
        run: |
          cache_complete=false
          reuse_kernel=false
          official_out_dir=""
          while IFS= read -r symvers; do
            candidate_dir="$(dirname "$symvers")"
            config_path="$candidate_dir/.config"
            autoconf_path="$candidate_dir/include/generated/autoconf.h"
            auto_conf_path="$candidate_dir/include/config/auto.conf"
            fixdep_path="$candidate_dir/scripts/basic/fixdep"
            modpost_path="$candidate_dir/scripts/mod/modpost"
            image_a="$candidate_dir/arch/arm64/boot/Image"
            image_b="$(dirname "$candidate_dir")/common/arch/arm64/boot/Image"
            config_modules_required=false
            if [ -f "$config_path" ]; then
              grep -q '^CONFIG_MODULES=y$' "$config_path" && config_modules_required=true
            fi
            if [ -f "$symvers" ] && \
               [ -f "$config_path" ] && \
               [ -f "$autoconf_path" ] && \
               [ -f "$auto_conf_path" ] && \
               [ -x "$fixdep_path" ] && \
               [ -x "$modpost_path" ] && \
               [ "$config_modules_required" = "true" ] && \
               { [ -f "$image_a" ] || [ -f "$image_b" ]; }; then
              official_out_dir="$candidate_dir"
              cache_complete=true
              reuse_kernel=true
              break
            fi
          done < <(find "$OFFICIAL_OUT_ROOT" -type f -name Module.symvers 2>/dev/null | sort)
          echo "cache_complete=$cache_complete" >>"$GITHUB_OUTPUT"
          echo "reuse_kernel=$reuse_kernel" >>"$GITHUB_OUTPUT"
          echo "official_out_dir=$official_out_dir" >>"$GITHUB_OUTPUT"
          echo "cache-hit=${{ steps.oneplus-kernel-cache.outputs.cache-hit }}"
          echo "cache-complete=$cache_complete"
          echo "reuse-kernel=$reuse_kernel"
          echo "official-out-dir=$official_out_dir"

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-oneplus-sm8550-ace2pro-a13-gki515-${{ hashFiles('.github/workflows/oneplus-sm8550-ace2pro-a13-gki515.yml') }}
          restore-keys: |
            ${{ runner.os }}-ccache-oneplus-sm8550-ace2pro-a13-gki515-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size="$CCACHE_MAXSIZE"
          ccache --set-config=base_dir="$CCACHE_BASEDIR"
          ccache --set-config=compiler_check="$CCACHE_COMPILERCHECK"
          ccache --zero-stats || true
          ccache --show-config || true

      - name: Install repo tool
        run: |
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/repo"
          chmod +x "$HOME/repo"
          sudo mv "$HOME/repo" /usr/local/bin/repo

      - name: Initialize repo and sync OnePlus kernel source
        run: |
          mkdir -p "$KERNEL_WORKSPACE"
          cd "$KERNEL_WORKSPACE"
          repo init \
            -u "$KERNEL_REPO_URL" \
            -b "refs/heads/oneplus/${ONEPLUS_CPU_BRANCH}" \
            -m "${ONEPLUS_FEIL}.xml" \
            --depth=1
          repo sync -c -j"$(nproc)" --fail-fast

      - name: Show fixed target
        run: |
          echo "CPU branch: ${ONEPLUS_CPU_BRANCH}"
          echo "Manifest: ${ONEPLUS_FEIL}.xml"
          echo "CPUD: ${ONEPLUS_CPUD}"
          echo "Build method: ${ONEPLUS_BUILD_METHOD}"
          echo "Android base: android13"
          echo "Kernel base: gki 5.15"

      - name: Build kernel outputs needed for external module (official script)
        run: |
          if [ "${{ steps.oneplus-kernel-cache-state.outputs.reuse_kernel }}" != "true" ]; then
            cd "$KERNEL_WORKSPACE"
            LTO=thin SYSTEM_DLKM_RE_SIGN=0 BUILD_SYSTEM_DLKM=0 KMI_SYMBOL_LIST_STRICT_MODE=0 \
              ./kernel_platform/oplus/build/oplus_build_kernel.sh "${ONEPLUS_CPUD}" "${ONEPLUS_BUILD_METHOD}"
          else
            echo "Reusing cached OnePlus kernel output from $OFFICIAL_OUT_ROOT"
          fi

      - name: Resolve official kernel out directory
        id: resolve-official-out
        run: |
          official_out_dir=""
          while IFS= read -r symvers; do
            candidate_dir="$(dirname "$symvers")"
            if [ -f "$candidate_dir/.config" ] && \
               [ -f "$candidate_dir/include/generated/autoconf.h" ] && \
               [ -f "$candidate_dir/include/config/auto.conf" ] && \
               [ -x "$candidate_dir/scripts/mod/modpost" ]; then
              official_out_dir="$candidate_dir"
              break
            fi
          done < <(find "$OFFICIAL_OUT_ROOT" -type f -name Module.symvers 2>/dev/null | sort)
          if [ -z "$official_out_dir" ]; then
            echo "Unable to locate official kernel out directory under $OFFICIAL_OUT_ROOT"
            find "$OFFICIAL_OUT_ROOT" -maxdepth 5 -type f -name Module.symvers -print || true
            exit 1
          fi
          echo "official_out_dir=$official_out_dir" >>"$GITHUB_OUTPUT"
          echo "official-out-dir=$official_out_dir"

          echo "kernelrelease-common:"
          make -s -C "$KERNEL_WORKSPACE/kernel_platform/common" O="$official_out_dir" ARCH=arm64 kernelrelease || true
          echo "kernelrelease-msm-kernel:"
          make -s -C "$KERNEL_WORKSPACE/kernel_platform/msm-kernel" O="$official_out_dir" ARCH=arm64 kernelrelease || true

      - name: Build external module against OnePlus android13-5.15 official output
        run: |
          OUT_DIR="${{ steps.resolve-official-out.outputs.official_out_dir }}"
          MODULE_SRC_DIRS=(
            "$KERNEL_WORKSPACE/kernel_platform/common"
            "$KERNEL_WORKSPACE/kernel_platform/msm-kernel"
          )
          build_ok=false
          for KERNEL_DIR in "${MODULE_SRC_DIRS[@]}"; do
            if [ ! -d "$KERNEL_DIR" ]; then
              continue
            fi
            echo "Trying external module build with KERNEL_DIR=$KERNEL_DIR O=$OUT_DIR"
            if make -C "$KERNEL_DIR" O="$OUT_DIR" M="$GITHUB_WORKSPACE" \
                ARCH=arm64 LLVM=1 CLANG_TRIPLE=aarch64-linux-gnu- \
                CC="ccache clang" CROSS_COMPILE=aarch64-linux-gnu- HOSTCC="ccache clang" \
                -j"$(nproc)" modules; then
              build_ok=true
              break
            fi
          done
          if [ "$build_ok" != "true" ]; then
            echo "External module build failed against both common and msm-kernel with official output"
            exit 1
          fi

      - name: Verify rebuilt OnePlus kernel cache
        id: oneplus-kernel-cache-verify
        if: always()
        run: |
          OUT_DIR="${{ steps.resolve-official-out.outputs.official_out_dir }}"
          IMAGE_A="$OUT_DIR/arch/arm64/boot/Image"
          IMAGE_B="$(dirname "$OUT_DIR")/common/arch/arm64/boot/Image"
          SYMVERS_PATH="$OUT_DIR/Module.symvers"
          CONFIG_PATH="$OUT_DIR/.config"
          AUTOCONF_PATH="$OUT_DIR/include/generated/autoconf.h"
          AUTO_CONF_PATH="$OUT_DIR/include/config/auto.conf"
          FIXDEP_PATH="$OUT_DIR/scripts/basic/fixdep"
          MODPOST_PATH="$OUT_DIR/scripts/mod/modpost"
          if { [ -f "$IMAGE_A" ] || [ -f "$IMAGE_B" ]; } && \
             [ -f "$SYMVERS_PATH" ] && \
             [ -f "$CONFIG_PATH" ] && \
             [ -f "$AUTOCONF_PATH" ] && \
             [ -f "$AUTO_CONF_PATH" ] && \
             [ -x "$FIXDEP_PATH" ] && \
             [ -x "$MODPOST_PATH" ]; then
            cache_complete=true
          else
            cache_complete=false
          fi
          echo "cache_complete=$cache_complete" >>"$GITHUB_OUTPUT"
          echo "cache-complete=$cache_complete"

      - name: Save OnePlus kernel output cache
        if: always() && steps.oneplus-kernel-cache-state.outputs.reuse_kernel != 'true' && steps.oneplus-kernel-cache-verify.outputs.cache_complete == 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.OFFICIAL_OUT_ROOT }}
          key: ${{ runner.os }}-oneplus-sm8550-ace2pro-a13-gki5.15-kernel-out-official-${{ env.KERNEL_OUT_CACHE_REV }}

      - name: Build host helper smoke binaries
        run: |
          cc -O2 -Wall -Wextra -o tools/lkmdbg_open_session tools/lkmdbg_open_session.c tools/driver/bridge_c.c
          cc -O2 -Wall -Wextra -o tools/lkmdbg_stealth_ctl tools/lkmdbg_stealth_ctl.c
          cc -O2 -Wall -Wextra -pthread -o tools/lkmdbg_mem_test tools/lkmdbg_mem_test.c tools/driver/bridge_c.c tools/driver/bridge_events.c tools/driver/bridge_memory.c tools/driver/bridge_control.c
          cc -O2 -Wall -Wextra -o tools/lkmdbg_sysrule_ctl tools/lkmdbg_sysrule_ctl.c tools/driver/bridge_c.c tools/driver/bridge_control.c

      - name: Run module and helper smoke checks
        run: |
          OUT_DIR="${{ steps.resolve-official-out.outputs.official_out_dir }}"
          test -f "$GITHUB_WORKSPACE/lkmdbg.ko"
          test -s "$GITHUB_WORKSPACE/lkmdbg.ko"
          test -f "$OUT_DIR/Module.symvers"
          test -x "$GITHUB_WORKSPACE/tools/lkmdbg_open_session"
          test -x "$GITHUB_WORKSPACE/tools/lkmdbg_stealth_ctl"
          test -x "$GITHUB_WORKSPACE/tools/lkmdbg_mem_test"
          test -x "$GITHUB_WORKSPACE/tools/lkmdbg_sysrule_ctl"
          aarch64-linux-gnu-readelf -h "$GITHUB_WORKSPACE/lkmdbg.ko" >/dev/null

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats || true

      - name: Prepare module artifacts
        run: |
          OUT_DIR="${{ steps.resolve-official-out.outputs.official_out_dir }}"
          mkdir -p "$RUNNER_TEMP/oneplus-sm8550-ace2pro-a13-gki515"
          cp "$GITHUB_WORKSPACE/lkmdbg.ko" "$RUNNER_TEMP/oneplus-sm8550-ace2pro-a13-gki515/"
          cp "$OUT_DIR/.config" "$RUNNER_TEMP/oneplus-sm8550-ace2pro-a13-gki515/kernel.config"
          cp "$OUT_DIR/Module.symvers" "$RUNNER_TEMP/oneplus-sm8550-ace2pro-a13-gki515/"

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: lkmdbg-oneplus-sm8550-ace2pro-android13-gki5.15
          path: ${{ runner.temp }}/oneplus-sm8550-ace2pro-a13-gki515/*
